name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 4.0.1)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o proxy-manager-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/proxy-manager
          ls -la proxy-manager-*

      - name: Smoke test (amd64 only)
        if: matrix.goarch == 'amd64'
        run: |
          ./proxy-manager-linux-amd64 --version
          ./proxy-manager-linux-amd64 --help | head -10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-manager-${{ matrix.goos }}-${{ matrix.goarch }}
          path: proxy-manager-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage release files
        run: |
          mkdir -p release
          for d in artifacts/*/; do
            name=$(basename "$d")
            cp "${d}${name}" "release/${name}"
            chmod +x "release/${name}"
          done
          (cd release && sha256sum * > checksums.txt)
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Proxy Manager v${{ steps.version.outputs.VERSION }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/proxy-manager-linux-amd64
            release/proxy-manager-linux-arm64
            release/checksums.txt
          body: |
            ## Proxy Manager v${{ steps.version.outputs.VERSION }}

            ### 一键安装 / 升级

            ```bash
            bash <(curl -sL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh)
            ```

            ### 直接下载

            | 平台 | 架构 | 链接 |
            |---|---|---|
            | Linux | amd64 | `proxy-manager-linux-amd64` |
            | Linux | arm64 | `proxy-manager-linux-arm64` |

            校验：见 `checksums.txt` (SHA-256)。

            支持的协议：Snell + Shadow-TLS / SS-2022 + Shadow-TLS / VLESS Reality / Hysteria2 / AnyTLS。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
