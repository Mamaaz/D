name: Tvtxiu
options:
  bundleIdPrefix: com.tvtxiu
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Tvtxiu-macOS:
    type: application
    platform: macOS
    sources:
      - path: Tvtxiu
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: TvR
        INFOPLIST_FILE: Tvtxiu/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.tvtxiu.app
        ENABLE_PREVIEWS: true
        CODE_SIGN_ENTITLEMENTS: Tvtxiu/Tvtxiu.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        # Hardened Runtime 和公证配置
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: true
        OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  Tvtxiu-iOS:
    type: application
    platform: iOS
    sources:
      - path: Tvtxiu
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: TvR
        INFOPLIST_FILE: Tvtxiu/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.tvtxiu.app.ios
        ENABLE_PREVIEWS: true
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  Tvtxiu-macOS:
    build:
      targets:
        Tvtxiu-macOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Tvtxiu-iOS:
    build:
      targets:
        Tvtxiu-iOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
